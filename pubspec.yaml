name: nutri_life
description: Aplicativo Nutri Life
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: any
  cloud_firestore: any
  firebase_auth: any
  # 📸 Bibliotecas para o Módulo de Mídia (Antes e Depois)
  firebase_storage: any # Armazena as fotos pesadas na nuvem
  image_picker: ^1.0.4  # Abre a câmera e a galeria do celular
  http: any
  mobile_scanner: any
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
