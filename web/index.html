<!DOCTYPE html>
<html>
<head>
  <base href="/NutriLife/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Aplicativo Nutri Life para Pacientes">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Nutri Life">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Nutri Life</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('flutter_service_worker.js').then(function (reg) {
          
          // Fica de olho se o GitHub enviou código novo
          reg.onupdatefound = function () {
            var installingWorker = reg.installing;
            installingWorker.onstatechange = function () {
              if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                // Nova atualização baixada em segundo plano!
                if (confirm("Uma nova versão do Nutri Life está disponível! Clique em OK para atualizar.")) {
                  // Força a página a recarregar ignorando o cache
                  window.location.reload(true);
                }
              }
            };
          };
          
        });
      });
    }
  </script>
</body>
</html>
