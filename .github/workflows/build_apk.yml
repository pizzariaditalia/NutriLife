name: Compilar Nutri Life (Android APK)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Compilar APK
    runs-on: ubuntu-latest

    steps:
      - name: Baixar Código do Repositório
        uses: actions/checkout@v4

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar ambiente Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      # ==========================================
      # TRUQUE MÁGICO 4.0: O MÉTODO INQUEBRÁVEL
      # ==========================================
      - name: Configurar Motor Android e Firebase
        run: |
          flutter create --platforms android --project-name nutri_life temp_app
          cp -r temp_app/android ./android
          rm -rf temp_app
          
          # 1. Move a chave do Firebase para o cofre do App
          if [ -f "google-services.json" ]; then
            echo "✅ Chave encontrada! Movendo..."
            mv google-services.json android/app/
          else
            echo "❌ ERRO CRÍTICO: google-services.json faltando na raiz!"
            exit 1
          fi
          
          # 2. Ajusta a versão mínima para o Firebase funcionar (API 21)
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle
          
          # 3. Cria a chamada do motor do Google do zero (Sem depender do template do Flutter)
          cat << 'EOF' > android/build.gradle.tmp
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.google.gms:google-services:4.4.1'
              }
          }
          EOF
          
          # 4. Cola o arquivo original embaixo do nosso bloco e salva
          cat android/build.gradle >> android/build.gradle.tmp
          mv android/build.gradle.tmp android/build.gradle
          
          # 5. Adiciona o ativador do Google na ÚLTIMA linha do arquivo (Forma oficial recomendada)
          echo "apply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle

      - name: Instalar dependências (pub get)
        run: flutter pub get

      - name: Construir o APK (Release)
        run: flutter build apk --release

      - name: Disponibilizar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: NutriLife-APK
          path: build/app/outputs/flutter-apk/app-release.apk
