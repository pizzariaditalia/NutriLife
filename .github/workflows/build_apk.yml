name: Compilar Nutri Life (Android APK)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Compilar APK
    runs-on: ubuntu-latest

    steps:
      - name: Baixar Código do Repositório
        uses: actions/checkout@v4

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar ambiente Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      # ==========================================
      # TRUQUE MÁGICO 3.0: INJEÇÃO BLINDADA
      # ==========================================
      - name: Configurar Motor Android e Firebase
        run: |
          flutter create --platforms android --project-name nutri_life temp_app
          cp -r temp_app/android ./android
          rm -rf temp_app
          
          # Verifica e move a chave do Firebase
          if [ -f "google-services.json" ]; then
            echo "✅ Chave do Firebase encontrada! Movendo para o app..."
            mv google-services.json android/app/
          else
            echo "❌ ERRO CRÍTICO: O arquivo google-services.json não está na raiz!"
            exit 1 # Para a compilação aqui mesmo se não achar a chave
          fi
          
          # Ajustar a versão mínima (API 21)
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle
          
          # Injeção à prova de falhas: Busca pela âncora exata do Flutter e insere o Firebase
          sed -i '/dev.flutter.settings/a \    id "com.google.gms.google-services" version "4.4.1" apply false' android/settings.gradle
          sed -i '/dev.flutter.flutter-gradle-plugin/a \    id "com.google.gms.google-services"' android/app/build.gradle

      - name: Instalar dependências (pub get)
        run: flutter pub get

      - name: Construir o APK (Release)
        run: flutter build apk --release

      - name: Disponibilizar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: NutriLife-APK
          path: build/app/outputs/flutter-apk/app-release.apk
