name: Compilar APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar Código do Repositório
        uses: actions/checkout@v4

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar ambiente Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Gerar Motor Android Básico
        run: |
          flutter create --platforms android --project-name nutri_life temp_app
          rm -rf android
          mv temp_app/android .
          rm -rf temp_app
          # 🚀 O GOLPE FINAL: Exigir API 26 anula a necessidade de Desugaring!
          echo "flutter.minSdkVersion=26" >> android/local.properties

      - name: Instalar dependências (pub get)
        run: flutter pub get

      - name: Construir o APK (Release)
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;30.0.3"
          flutter build apk --release

      - name: Disponibilizar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
