name: Publicar Painel Web (React)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: painel_nutri/package.json

      - name: Instalar dependências e compilar
        run: |
          cd painel_nutri
          npm install
          npm run build

      - name: Configurar Pages
        uses: actions/configure-pages@v4

      - name: Subir artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'painel_nutri/dist'

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
